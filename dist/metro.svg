        <!-- Connected trailing coach -->
        <rect x="-24" y="-3" width="12" height="6" rx="1" fill="#00d2ff" stroke="#333" stroke-width="0.5" />
        <!-- Coupling link -->
        <line x1="-12" y1="0" x2="-10" y2="0" stroke="#777" stroke-width="1.5"/>
        
        <!-- Glowing coach window dots -->
